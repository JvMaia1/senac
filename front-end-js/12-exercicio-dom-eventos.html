<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM + Eventos</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: auto;
            background: rgb(147, 147, 147);
            padding: 20px;
        }
        
        .aprovado {
            color: rgb(31, 25, 202);
        }

        .reprovado {
            color: rgb(202, 25, 25);
        }
        
    </style>
</head>

<body>
    <div class="container">
        <h1>Exercício DOM + Eventos</h1>
        <section>
            <h2>Calculadora de Média</h2>
            <form id='form' action="" method="post">
                <p>
                    <label for="nota1">Nota 1:</label>
                    <input id="input1" type="number" required min="0" max="10" step="0.01">

                    <label for="nota2">Nota 2:</label>
                    <input id="input2" type="number" required min="0" max="10" step="0.01">
                </p>
                <button>Calcular Média</button>
            </form>
        </section>

        <section>
            <h2>Resultados</h2>
            <div id="caixaResultado">
                <p id="resultado"></p>
                <p id="dialogo"></p>
            </div>
        </section>

    </div>


   

</body>
    <script src="js/12-exercicio-dom-eventos.js"></script>
</html>
