<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media dos alunos</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: auto;
            background: rgb(147, 147, 147);
            padding: 20px;
        }
        
        .aprovado {
            color: rgb(31, 25, 202);
        }

        .reprovado {
            color: rgb(202, 25, 25);
        }
        
    </style>
</head>

<body>
    <div class="container">
        <h1>Media dos alunos</h1>
        <section>
            <h2>Calculadora de Média</h2>
            <form id='form' action="" method="post">
                <p>
                    
                    <label for="aluno">Nome aluno:</label>
                    <input id="inputNome" type="text" required>
                    <br>

                    <label for="nota1">Nota 1:</label>
                    <input id="input1" type="number" required min="0" max="10" step="0.01">

                    <label for="nota2">Nota 2:</label>
                    <input id="input2" type="number" required min="0" max="10" step="0.01">
                </p>
                <button>Calcular Média</button>
            </form>
        </section>

        <section>
            <h2>Lista de resultados</h2>
            <h3>Quantidade de registros: <span id="contador"></span> </h3>
            <ul id="listaDeResultados"> <span id="resultado"></span>  <span id="dialogo"></span> </ul>
           
        </section>

    </div>

</body>
    <script src="js/exercicio-dom-eventos-extra.js"></script>
</html>
